        /* 中央羅盤大圓圈 */

            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;

        .center-node {
            width: 100px;
            height: 100px;
            background-color: #ffffff;

            border-radius: 50%;
            display: flex;
            flex-direction: column;

            font-weight: bold;
            letter-spacing: 1px;
        }

        .center-node .question {
            font-size: 28px;
            font-weight: 900;
            color: #212529;
            margin-top: 2px;
        }

        /* --- 動態物理模擬看板設計 --- */
        .fixed-card {
            position: absolute;
            left: 0;
            top: 0;
            width: 155px;
            background: #ffffff;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 10px 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.04);

            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 15;
            transition: border-color 0.2s;
            will-change: transform;

{ id: 37, target: '台北市萬華區', hints: [{ name: '新北市石門區', distance: 29.2, azi: 13.4 }, { name: '宜蘭縣宜蘭市', distance: 40.5, azi: 140.5 }, { name: '花蓮縣花蓮市', distance: 117.1, azi: 174.5 }, { name: '苗栗縣苗栗市', distance: 86.5, azi: 232.6 }, { name: '新北市淡水區', distance: 17.8, azi: 341.3 }] },
{ id: 38, target: '台北市松山區', hints: [{ name: '新北市金山區', distance: 20, azi: 17.2 }, { name: '宜蘭縣礁溪鄉', distance: 31.8, azi: 141.7 }, { name: '南投縣國姓鄉', distance: 133.5, azi: 213 }, { name: '桃園市觀音區', distance: 49.9, azi: 267.1 }, { name: '新北市淡水區', distance: 20.3, azi: 318.3 }] },
{ id: 39, target: '桃園市中壢區', hints: [{ name: '新北市石門區', distance: 50, azi: 43.6 }, { name: '宜蘭縣宜蘭市', distance: 58.4, azi: 113.7 }, { name: '台中市豐原區', distance: 95.2, azi: 212.6 }, { name: '苗栗縣苗栗市', distance: 60.8, azi: 222.5 }, { name: '連江縣莒光鄉', distance: 171.2, azi: 310.8 }] },
{ id: 40, target: '新北市深坑區', hints: [{ name: '新北市瑞芳區', distance: 22.9, azi: 58.7 }, { name: '宜蘭縣頭城鎮', distance: 26.4, azi: 128 }, { name: '花蓮縣花蓮市', distance: 113, azi: 180.2 }, { name: '桃園市中壢區', distance: 39.7, azi: 263.9 }, { name: '新北市八里區', distance: 27, azi: 308.2 }] }
        ];

        // 初始化下拉選單
        const selectEl = document.getElementById('quiz-select');
        quizData.forEach((quiz, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = `題庫 ${quiz.id}`;
            selectEl.appendChild(option);
        });

        let currentQuizIndex = 0;

        // 物理模擬相關設定與狀態
        const layoutEl = document.querySelector('.quiz-layout');
        let layoutWidth = layoutEl.clientWidth;
        let layoutHeight = layoutEl.clientHeight || 520;

        window.addEventListener('resize', () => {
            layoutWidth = layoutEl.clientWidth;
            layoutHeight = layoutEl.clientHeight || 520;
            startSimulation();
        });

        // 初始化 5 個卡片資料結構
        let cards = [];
        for (let i = 0; i < 5; i++) {
            cards.push({
                element: document.getElementById(`card-${i}`),
                x: 0,
                y: 0,
                vx: 0,
                vy: 0,
                w: 155,
                h: 58,
                idealX: 0,
                idealY: 0,
                azi: 0,
                name: '',
                distance: 0
            });
        }

        let animId = null;

        function startSimulation() {
            if (!animId) {
                tick();
            }
        }

        function tick() {
            const active = updatePhysics();
            drawSVG();
            if (active) {
                animId = requestAnimationFrame(tick);
            } else {
                animId = null;
            }
        }

        function updatePhysics() {
            const cx = layoutWidth / 2;
            const cy = layoutHeight / 2;

            // 動態獲取卡片的寬高（以防文字折行導致高度變動）
            cards.forEach(card => {
                card.w = card.element.offsetWidth || 155;
                card.h = card.element.offsetHeight || 58;
            });

            const compassRadius = 160;
            const cardMargin = 5;

            // 1. 計算理想位置（依據方位角計算自適應半徑 R，確保不遮擋中央羅盤）
            cards.forEach(card => {
                const rad = card.azi * Math.PI / 180;
                // 橢圓形狀逼近法來動態決定與圓心的距離，避免卡片左右太寬時疊到圓圈
                const R = compassRadius + Math.abs(Math.sin(rad)) * (card.w / 2) + Math.abs(Math.cos(rad)) * (card.h / 2) + 20;

                card.idealX = cx + Math.sin(rad) * R;
                card.idealY = cy - Math.cos(rad) * R;

                // 彈力吸引至理想位置
                const kAttract = 0.08;
                card.vx += (card.idealX - card.x) * kAttract;
                card.vy += (card.idealY - card.y) * kAttract;
            });

            // 2. 卡片之間的斥力，至少維持 5px 距離
            for (let i = 0; i < cards.length; i++) {
                for (let j = i + 1; j < cards.length; j++) {
                    const dx = cards[i].x - cards[j].x;
                    const dy = cards[i].y - cards[j].y;

                    const minDistX = (cards[i].w + cards[j].w) / 2 + cardMargin;
                    const minDistY = (cards[i].h + cards[j].h) / 2 + cardMargin;

                    const overlapX = minDistX - Math.abs(dx);
                    const overlapY = minDistY - Math.abs(dy);

                    if (overlapX > 0 && overlapY > 0) {
                        const kRepel = 0.525;
                        // 沿著重合度最小的軸推開以保證平穩
                        if (overlapX < overlapY) {
                            const sign = dx > 0 ? 1 : -1;
                            const force = sign * overlapX * kRepel;
                            cards[i].vx += force;
                            cards[j].vx -= force;
                        } else {
                            const sign = dy > 0 ? 1 : -1;
                            const force = sign * overlapY * kRepel;
                            cards[i].vy += force;
                            cards[j].vy -= force;
                        }
                    }
                }
            }

            // 3. 羅盤中心的物理斥力，防止任何卡片覆蓋到羅盤
            cards.forEach(card => {
                const dcx = card.x - cx;
                const dcy = card.y - cy;
                const dist = Math.hypot(dcx, dcy) || 1;
                const rad = Math.atan2(dcy, dcx);
                const minCenterDist = compassRadius + Math.abs(Math.cos(rad)) * (card.w / 2) + Math.abs(Math.sin(rad)) * (card.h / 2) + 10;

                if (dist < minCenterDist) {
                    const push = (minCenterDist - dist) * 0.3;
                    card.vx += (dcx / dist) * push;
                    card.vy += (dcy / dist) * push;
                }
            });

            // 4. 套用速度、阻尼與邊界限制
            const damping = 0.75;
            let moving = false;

            cards.forEach(card => {
                card.vx *= damping;
                card.vy *= damping;
                card.x += card.vx;
                card.y += card.vy;

                // 邊界碰撞限制 (留 10px 內縮邊緣)
                const halfW = card.w / 2;
                const halfH = card.h / 2;

                if (card.x < halfW + 10) {
                    card.x = halfW + 10;
                    card.vx = 0;
                } else if (card.x > layoutWidth - halfW - 10) {
                    card.x = layoutWidth - halfW - 10;
                    card.vx = 0;
                }

                if (card.y < halfH + 10) {
                    card.y = halfH + 10;
                    card.vy = 0;
                } else if (card.y > layoutHeight - halfH - 10) {
                    card.y = layoutHeight - halfH - 10;
                    card.vy = 0;
                }

                // 更新 DOM 位置 (使用 translate3d 提高渲染效能與流暢度)
                card.element.style.transform = `translate3d(${card.x - halfW}px, ${card.y - halfH}px, 0)`;

                // 若速度或偏離理想位置的距離大於閾值，則持續進行物理模擬
                const speed = Math.hypot(card.vx, card.vy);
                const deviation = Math.hypot(card.x - card.idealX, card.y - card.idealY);
                if (speed > 0.05 || deviation > 0.5) {
                    moving = true;
                }
            });

            return moving;
        }

        function drawSVG() {
            const cx = layoutWidth / 2;
            const cy = layoutHeight / 2;

            const guideLinesGroup = document.getElementById('guide-lines-group');
            const arrowsGroup = document.getElementById('arrows-group');
            const badgesGroup = document.getElementById('badges-group');

            // 清空舊線段與箭頭
            guideLinesGroup.innerHTML = '';
            arrowsGroup.innerHTML = '';
            badgesGroup.innerHTML = '';

            cards.forEach((card, i) => {
                // 絕對方向的單位向量 (依據原始方位角 azi 計算，不隨卡片偏移而改變)
                const rad = card.azi * Math.PI / 180;
                const ux = Math.sin(rad);
                const uy = -Math.cos(rad);

                // 箭頭起點：中央圓形節點邊緣 (半徑 50px)
                const arrowStartX = cx + ux * 50;
                const arrowStartY = cy + uy * 50;

                // 箭頭終點：羅盤外圓範圍內 (長度由 card.arrowLength 決定)
                const arrowEndX = cx + ux * card.arrowLength;
                const arrowEndY = cy + uy * card.arrowLength;

                // 1. 繪製黑色的實線箭頭
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', arrowStartX);
                line.setAttribute('y1', arrowStartY);
                line.setAttribute('x2', arrowEndX);
                line.setAttribute('y2', arrowEndY);
                line.setAttribute('stroke', '#212529');
                line.setAttribute('stroke-width', '2.5');
                line.setAttribute('marker-end', 'url(#arrowhead)');

                // 加一個懸浮文字提示
                const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                title.textContent = `${card.name}: ${card.distance} km (${card.azi}°)`;
                line.appendChild(title);

                arrowsGroup.appendChild(line);

                // 2. 繪製虛線引導線：從箭頭終點連接到卡片邊緣
                // 卡片邊緣由卡片外接框計算，簡單起見直接連到卡片中心 (因為卡片有 white bg 和 z-index: 15 會壓在線上面)
                const guideLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                guideLine.setAttribute('x1', arrowEndX);
                guideLine.setAttribute('y1', arrowEndY);
                guideLine.setAttribute('x2', card.x);
                guideLine.setAttribute('y2', card.y);
                guideLine.setAttribute('stroke', '#cbd5e1');
                guideLine.setAttribute('stroke-width', '1.5');
                guideLine.setAttribute('stroke-dasharray', '4 4');
                guideLinesGroup.appendChild(guideLine);
            });
        }

        function loadQuiz(index) {
            currentQuizIndex = parseInt(index);
            const quiz = quizData[currentQuizIndex];
            document.getElementById('quiz-title').textContent = `地理猜謎：題庫 ${quiz.id}`;

            // 隱藏前一題答案
            const ansDisplay = document.getElementById('answer-display');
            ansDisplay.style.display = 'none';
            document.getElementById('show-answer-btn').textContent = '顯示答案';

            const cx = layoutWidth / 2;
            const cy = layoutHeight / 2;

            // 填入 5 個卡片資料並初始化物理模擬位置 (會加入微小隨機量破壞對稱性)
            quiz.hints.forEach((hint, i) => {
                const card = cards[i];
                card.azi = hint.azi;
                card.name = hint.name;
                card.distance = hint.distance;

                // 更新外圍看板文字
                card.element.innerHTML = `
                    <span class="town-name">${hint.name}</span>
                    <span class="town-dist">${hint.distance} km</span>
                `;

                // 測量實際高寬
                card.w = card.element.offsetWidth || 155;
                card.h = card.element.offsetHeight || 58;
            });

            // 計算 5 個等差長度的箭頭
            const dists = cards.map(c => c.distance);
            const dMin = Math.min(...dists);
            const dMax = Math.max(...dists);

            // 判斷等比縮放極值 (以 max 為 180px 去除箭頭三角形約 160px)
            let lMin = (dMin / dMax) * 160;
            if (lMin < 80) {
                lMin = 80;
            }

            // 計算出 5 個等差的長度階層
            const levels = [];
            for (let k = 0; k < 5; k++) {
                levels.push(lMin + k * (160 - lMin) / 4);
            }

            // 使用內插法對應出每個距離的等差長度 (四捨五入到對應的階層)
            cards.forEach(card => {
                let k = 0;
                if (dMax > dMin) {
                    k = Math.round((card.distance - dMin) / (dMax - dMin) * 4);
                }
                card.arrowLength = Math.round(levels[k]);
            });

            quiz.hints.forEach((hint, i) => {
                const card = cards[i];
                const rad = hint.azi * Math.PI / 180;
                const R = 160 + Math.abs(Math.sin(rad)) * (card.w / 2) + Math.abs(Math.cos(rad)) * (card.h / 2) + 20;

                // 初始化位置設在理想方位，並加入少許隨機以防完美對稱時沒有推力
                const randOffset = (Math.random() - 0.5) * 5;
                card.x = cx + Math.sin(rad) * R + randOffset;
                card.y = cy - Math.cos(rad) * R + randOffset;
                card.vx = 0;
                card.vy = 0;
            });

            // 開始物理模擬
            startSimulation();
        }

        function toggleAnswer() {
            const ansDisplay = document.getElementById('answer-display');
            const btn = document.getElementById('show-answer-btn');
            const quiz = quizData[currentQuizIndex];

            if (ansDisplay.style.display === 'none' || ansDisplay.style.display === '') {
                ansDisplay.textContent = `答案是：${quiz.target}`;
                ansDisplay.style.display = 'block';
                btn.textContent = '隱藏答案';
            } else {
                ansDisplay.style.display = 'none';
                btn.textContent = '顯示答案';
            }
        }

        // 初始化預設第一題
        loadQuiz(0);
    </script>
